<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieSwipe</title>

  <style>
    /* ... (Le CSS précédent reste le même) ... */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b132b;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      background-color: #1c2541;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: space-between; /* Permet d'espacer le titre et le code */
      align-items: center;
    }

    /* --- NOUVEAU : LE DESIGN DE L'ÉCRAN D'ACCUEIL --- */
    #ecran-accueil {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .box-accueil {
      background-color: #1c2541;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 300px;
      margin-bottom: 20px;
    }

    .btn-accueil {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      transition: transform 0.2s;
    }

    .btn-accueil:active {
      transform: scale(0.95);
    }

    .input-code {
      width: 100%;
      padding: 15px;
      font-size: 1.5em;
      text-align: center;
      border-radius: 10px;
      border: 2px solid #3a506b;
      background-color: #0b132b;
      color: white;
      margin-bottom: 15px;
      box-sizing: border-box; /* Évite que l'input dépasse de la boîte */
    }

    /* On cache l'écran de swipe au démarrage */
    #ecran-swipe {
      display: none; 
      flex: 1;
      flex-direction: column;
    }
    /* ----------------------------------------------- */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 15px;
      position: relative;
    }

    .carte-film {
      background-color: #050a17;
      width: 100%;
      max-width: 320px;
      height: 450px;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      display: flex;
      transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;
    }

    .carte-film:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .swipe-gauche { transform: translateX(-150%) rotate(-20deg) !important; opacity: 0; }
    .swipe-droite { transform: translateX(150%) rotate(20deg) !important; opacity: 0; }

    .affiche {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      font-style: italic;
    }

    .infos-fixes {
      width: 95%;
      max-width: 400px;
      height: 160px;
      margin-top: 25px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      overflow-y: auto; 
      scrollbar-width: none; 
      -ms-overflow-style: none; 
    }
    .infos-fixes::-webkit-scrollbar { display: none; }

    .titre { margin: 0 0 8px 0; font-size: 1.5em; color: #ffffff; }
    .description { margin: 0; font-size: 0.95em; color: #9fb3c8; line-height: 1.4; padding-bottom: 20px; }

    .boutons {
      padding: 10px 20px 30px 20px;
      display: flex;
      justify-content: space-evenly;
      background-color: transparent;
    }

    .btn-rond {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 2em;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-non { background-color: transparent; color: #ff4b4b; border: 2px solid #ff4b4b; }
    .btn-non:hover { background-color: #ff4b4b; color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(255, 75, 75, 0.5); }
    .btn-oui { background-color: transparent; color: #4CAF50; border: 2px solid #4CAF50; }
    .btn-oui:hover { background-color: #4CAF50; color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(76, 175, 80, 0.5); }
    .btn-rond:active { transform: scale(0.95); }
    
    #affichage-code {
        font-size: 0.7em;
        background-color: rgba(255,255,255,0.1);
        padding: 5px 10px;
        border-radius: 5px;
        display: none; /* Caché au début */
    }
    /* Fenêtre de Match */
#overlay-match {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(11, 19, 43, 0.95);
  z-index: 1000;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  animation: fadeIn 0.5s ease;
}

.contenu-match {
  background: #1c2541;
  padding: 30px;
  border-radius: 30px;
  border: 3px solid #4CAF50;
  box-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
  max-width: 80%;
}

.affiche-match {
  width: 150px;
  border-radius: 15px;
  margin: 20px 0;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}
  </style>
</head>

<body>

  <header>
      <span>🎬 MovieSwipe</span>
      <span id="affichage-code">Code: ----</span>
  </header>

  <div id="ecran-accueil">
      <div class="box-accueil">
          <h2>Nouvelle soirée ?</h2>
          <p style="color: #9fb3c8; margin-bottom: 20px;">Crée un salon et partage le code à tes amis.</p>
          <button class="btn-accueil" onclick="creerSalon()">Créer un salon</button>
      </div>

      <div class="box-accueil">
          <h2>Rejoindre des amis</h2>
          <input type="text" id="input-code" class="input-code" placeholder="Ex: 4829" maxlength="4">
          <button class="btn-accueil" style="background-color: #3a506b;" onclick="rejoindreSalon()">Rejoindre</button>
      </div>
  </div>

  <div id="ecran-swipe">
      <main>
        <div class="carte-film" id="carte">
          <div class="affiche" id="affiche-film">Chargement...</div>
        </div>
        <div class="infos-fixes">
          <h2 class="titre" id="titre-film">Titre du film</h2>
          <p class="description" id="resume-film">Résumé en cours de chargement...</p>
        </div>
      </main>

      <div class="boutons">
        <button class="btn-rond btn-non" onclick="swiper('non')">❌</button>
        <button class="btn-rond btn-oui" onclick="swiper('oui')">❤️</button>
      </div>
  </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, update, onValue } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDGYw8Ogut6RqfaNi5YnLHbY1UEjlux2fk",
          authDomain: "movieswipe-95464.firebaseapp.com",
          projectId: "movieswipe-95464",
          storageBucket: "movieswipe-95464.firebasestorage.app",
          messagingSenderId: "512543137074",
          appId: "1:512543137074:web:75836f25f752f2c2588b2b",
          databaseURL: "https://movieswipe-95464-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let listeDesFilms = [];
        let indexFilmActuel = 0;
        let monCodeSalon = "";
        let nombreMembresSalon = 0;

        // Utilisation de sessionStorage pour permettre le test sur plusieurs onglets
        const monIdUnique = 'user_' + Math.random().toString(36).substr(2, 9);

        async function creerSalon() {
            monCodeSalon = Math.floor(1000 + Math.random() * 9000).toString(); 
            await set(ref(db, 'salons/' + monCodeSalon), {
                membres: 1,
                date: Date.now()
            });
            ecouterLesMatchs();
            demarrerAppli();
        }

        async function rejoindreSalon() {
            const codeSaisi = document.getElementById('input-code').value;
            const snapshot = await get(child(ref(db), `salons/${codeSaisi}`));
            if (snapshot.exists()) {
                monCodeSalon = codeSaisi;
                const nouveauNombre = (snapshot.val().membres || 1) + 1;
                await update(ref(db, 'salons/' + monCodeSalon), { membres: nouveauNombre });
                ecouterLesMatchs();
                demarrerAppli();
            } else { alert("Salon introuvable !"); }
        }

        function ecouterLesMatchs() {
            onValue(ref(db, `salons/${monCodeSalon}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                nombreMembresSalon = data.membres;
                if (data.votes) {
                    Object.keys(data.votes).forEach(filmId => {
                        const votesDuFilm = data.votes[filmId];
                        const nbVotesPositifs = Object.values(votesDuFilm).filter(v => v === true).length;
                        if (nbVotesPositifs >= nombreMembresSalon && nombreMembresSalon > 1) {
                            trouverInfosFilmEtAfficherMatch(filmId);
                        }
                    });
                }
            });
        }

        async function chargerFilms() {
            const res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=5f384e833c17a51649e853af374154da&language=fr-FR`);
            const data = await res.json();
            listeDesFilms = data.results;
            afficherFilmCourant();
        }

        function swiper(choix) {
            const film = listeDesFilms[indexFilmActuel];
            const estOui = (choix === 'oui');
            set(ref(db, `salons/${monCodeSalon}/votes/${film.id}/${monIdUnique}`), estOui);

            const carte = document.getElementById('carte');
            carte.classList.add(estOui ? 'swipe-droite' : 'swipe-gauche');

            setTimeout(() => {
                indexFilmActuel++;
                afficherFilmCourant();
                carte.style.transition = 'none'; 
                carte.classList.remove('swipe-droite', 'swipe-gauche');
                setTimeout(() => { carte.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; }, 50);
            }, 300);
        }

        function trouverInfosFilmEtAfficherMatch(filmId) {
            const filmGagnant = listeDesFilms.find(f => f.id.toString() === filmId.toString());
            if (filmGagnant) {
                document.getElementById('titre-match-gagnant').textContent = filmGagnant.title;
                document.getElementById('image-match-container').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${filmGagnant.poster_path}" class="affiche-match">`;
                document.getElementById('overlay-match').style.display = 'flex';
            }
        }

        function demarrerAppli() {
            document.getElementById('ecran-accueil').style.display = 'none';
            document.getElementById('ecran-swipe').style.display = 'flex';
            document.getElementById('affichage-code').style.display = 'inline-block';
            document.getElementById('affichage-code').textContent = "Code: " + monCodeSalon;
            chargerFilms();
        }

        function fermerMatch() { document.getElementById('overlay-match').style.display = 'none'; }
        
        function afficherFilmCourant() {
            if (indexFilmActuel >= listeDesFilms.length) return;
            const film = listeDesFilms[indexFilmActuel];
            document.getElementById('titre-film').textContent = film.title;
            document.getElementById('resume-film').textContent = film.overview || "Pas de résumé.";
            document.getElementById('affiche-film').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${film.poster_path}" style="width:100%;height:100%;object-fit:contain;">`;
        }

        window.creerSalon = creerSalon;
        window.rejoindreSalon = rejoindreSalon;
        window.swiper = swiper;
        window.fermerMatch = fermerMatch;
    </script>

<div id="overlay-match">
    <div class="contenu-match">
        <h1 style="color: #4CAF50; margin: 0;">🎉 C'EST UN MATCH !</h1>
        <p id="texte-match">Vous avez tous choisi :</p>
        <h2 id="titre-match-gagnant">Nom du film</h2>
        <div id="image-match-container"></div>
        <button class="btn-accueil" onclick="fermerMatch()" style="margin-top: 20px;">Continuer à swiper</button>
    </div>
</div>

</body>
</html>
