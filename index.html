<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MovieSwipe</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0b132b;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh; /* 🪄 Gère la barre du navigateur sur mobile */
      overflow: hidden;
      touch-action: none;
    }

    header {
      background-color: #1c2541;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    #ecran-accueil {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .box-accueil {
      background-color: #1c2541;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 300px;
      margin-bottom: 20px;
    }

    .btn-accueil {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 1.2em;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      transition: transform 0.2s;
    }

    .input-code {
      width: 100%;
      padding: 15px;
      font-size: 1.5em;
      text-align: center;
      border-radius: 10px;
      border: 2px solid #3a506b;
      background-color: #0b132b;
      color: white;
      margin-bottom: 15px;
      box-sizing: border-box;
    }
    
    .grille-plateformes {
      display: grid;
      grid-template-columns: 1fr 1fr; /* Met les boîtes sur 2 colonnes */
      gap: 10px;
    }

    .plateforme-card {
      cursor: pointer;
      display: block;
    }

    /* 1. On cache la vraie case moche */
    .plateforme-card input[type="checkbox"] {
      display: none; 
    }

    /* 2. Le design de base de la boîte (non cochée) */
    .plateforme-content {
      background-color: #0b132b;
      border: 2px solid #3a506b;
      border-radius: 12px;
      padding: 15px 5px;
      text-align: center;
      font-weight: bold;
      color: #5c728a; /* Texte un peu éteint */
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    /* 3. L'effet magique quand c'est coché ! */
    .plateforme-card input:checked + .plateforme-content {
      color: white;
      transform: translateY(-3px); /* Fait "sauter" le bouton légèrement vers le haut */
      box-shadow: 0 8px 15px rgba(0,0,0,0.4);
    }

    /* 4. Couleurs officielles pour la surbrillance des bordures */
    .plateforme-card input:checked + .netflix { border-color: #E50914; background-color: rgba(229, 9, 20, 0.1); }
    .plateforme-card input:checked + .prime { border-color: #00A8E1; background-color: rgba(0, 168, 225, 0.1); }
    .plateforme-card input:checked + .disney { border-color: #113CCF; background-color: rgba(17, 60, 207, 0.1); }
    .plateforme-card input:checked + .canal { border-color: #ffffff; background-color: rgba(255, 255, 255, 0.1); }
    
    #ecran-swipe {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px; /* Un peu moins de marges */
      position: relative;
      overflow: hidden; /* 🪄 Empêche quoi que ce soit de dépasser */
    }

    .carte-film {
      background-color: #050a17;
      flex: 1; 
      min-height: 0; 
      /* --- LA MAGIE EST ICI --- */
      aspect-ratio: 2 / 3; /* Force la carte à avoir la forme exacte de l'affiche */
      max-width: 85vw; /* Ne déborde pas sur les côtés sur mobile */
      max-height: 450px; /* Limite la taille sur un écran d'ordinateur */
      margin: 0 auto; /* Centre la carte parfaitement */
      /* ------------------------ */
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      display: flex;
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
      position: relative;
    }

    /* --- 1. AJUSTEMENT SMARTPHONES (Vue Classique) --- */
    /* --- AJUSTEMENTS MOBILES --- */
    @media (max-width: 600px) {
      .carte-film {
        max-height: 52vh; /* Limite la hauteur de l'affiche pour sauver les boutons */
      }
      .boutons {
        gap: 30px;
        padding-bottom: 25px;
      }
      .infos-fixes {
        height: 110px;
      }
      .description {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
    }

    /* --- 2. AJUSTEMENT PETITE HAUTEUR (ex: Mode Paysage ou petits téléphones) --- */
    @media (max-height: 700px) {
      header {
        padding: 10px;
        font-size: 1.2em;
      }
      .carte-film { 
        height: 50vh; 
      }
      .infos-fixes {
        max-height: 12vh;
        margin-top: 5px;
      }
      .description {
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .boutons {
        padding-bottom: 10px;
      }
      .btn-rond { 
        width: 55px; 
        height: 55px; 
      }
    }

    .swipe-gauche { transform: translateX(-150vw) rotate(-20deg) !important; opacity: 0; transition: transform 0.5s ease, opacity 0.5s !important; }
    .swipe-droite { transform: translateX(150vw) rotate(20deg) !important; opacity: 0; transition: transform 0.5s ease, opacity 0.5s !important; }

    .affiche {
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .affiche img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .infos-fixes {
      width: 95%;
      max-width: 400px;
      height: 120px; /* On verrouille la place pour le texte */
      flex-shrink: 0; /* 🪄 Interdit à l'affiche d'écraser le texte */
      margin-top: 15px;
      text-align: center;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .titre { margin: 0 0 5px 0; font-size: 1.4em; color: #ffffff; }
    .description { margin: 0; font-size: 0.9em; color: #9fb3c8; line-height: 1.4; }

    .boutons {
      padding: 10px 0 30px 0;
      display: flex;
      justify-content: center;
      gap: 50px;
    }

    .btn-rond {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-size: 2em;
      cursor: pointer;
      border: 2px solid;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
    }

    .btn-non { color: #ff4b4b; border-color: #ff4b4b; }
    .btn-oui { color: #4CAF50; border-color: #4CAF50; }

    #affichage-code {
        font-size: 0.7em;
        background-color: rgba(255,255,255,0.1);
        padding: 5px 10px;
        border-radius: 5px;
        display: none;
    }

    #overlay-match {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11, 19, 43, 0.96);
      z-index: 1000;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .contenu-match {
      background: #1c2541;
      padding: 30px;
      border-radius: 30px;
      border: 3px solid #4CAF50;
      max-width: 80%;
    }

    .affiche-match { width: 150px; border-radius: 15px; margin: 15px 0; }
  </style>
</head>

<body>

  <header>
    <span onclick="retourAccueil()" style="cursor: pointer; user-select: none;">🎬 MovieSwipe</span>
    <span id="affichage-code"></span>
  </header>

  <div id="ecran-accueil">
      <div class="box-accueil">
          <h2>Nouvelle soirée ?</h2>
          <button class="btn-accueil" onclick="creerSalon()">Créer un salon</button>
      </div>
      <div class="box-accueil">
          <h2>Rejoindre des amis</h2>
          <input type="text" id="input-code" class="input-code" placeholder="Ex: 4829" maxlength="4">
          <button class="btn-accueil" style="background-color: #3a506b;" onclick="rejoindreSalon()">Rejoindre</button>
      </div>
  </div>

  <div id="ecran-attente" style="display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center;">
      <div class="box-accueil">
          <h2>Salon d'attente</h2>
          <p style="font-size: 1.2em; color: #9fb3c8;">Code à partager :</p>
          <h1 id="code-attente" style="font-size: 3em; margin: 10px 0; letter-spacing: 5px; color: #4CAF50;"></h1>
          <p style="font-size: 1.2em;">Joueurs connectés : <strong id="nb-joueurs">1</strong> 👤</p>
          
          <!-- NOUVEAU : BOÎTE DE CHOIX (Sera cachée pour les invités) -->
          <div id="choix-plateformes" style="margin: 15px 0; display: none; width: 100%;">
              <p style="margin: 0 0 10px 0; font-size: 1.1em; text-align: center; color: #9fb3c8;">Qu'est-ce qu'on regarde ?</p>
              
              <div class="grille-plateformes">
                  <label class="plateforme-card">
                      <input type="checkbox" class="provider-cb" value="8" checked>
                      <div class="plateforme-content netflix">Netflix</div>
                  </label>
                  <label class="plateforme-card">
                      <input type="checkbox" class="provider-cb" value="119" checked>
                      <div class="plateforme-content prime">Prime Video</div>
                  </label>
                  <label class="plateforme-card">
                      <input type="checkbox" class="provider-cb" value="337" checked>
                      <div class="plateforme-content disney">Disney+</div>
                  </label>
                  <label class="plateforme-card">
                      <input type="checkbox" class="provider-cb" value="381">
                      <div class="plateforme-content canal">Canal+</div>
                  </label>
              </div>
          </div>

          <button id="btn-commencer" class="btn-accueil" onclick="lancerPartie()" style="margin-top: 20px; display: none;">Lancer la soirée !</button>
          <p id="msg-attente" style="margin-top: 20px; color: #9fb3c8;">En attente du créateur...</p>
      </div>
  </div>

  <div id="ecran-swipe">
      <main>
        <div class="carte-film" id="carte">
          <div class="affiche" id="affiche-film">Chargement...</div>
        </div>
        <div class="infos-fixes">
          <h2 id="titre-film" style="margin: 0 0 5px 0; font-size: 1.3em;">Chargement...</h2>
          <div id="note-film" style="color: #ffd700; font-weight: bold; margin-bottom: 5px; font-size: 0.9em;"></div>
          <p id="resume-film" style="margin: 0; font-size: 0.9em; color: #9fb3c8;"></p>
        </div>
      </main>

      <div class="boutons">
        <button class="btn-rond btn-non" onclick="swiper('non')">❌</button>
        <button class="btn-rond btn-oui" onclick="swiper('oui')">❤️</button>
      </div>
  </div>

  <div id="overlay-match">
      <div class="contenu-match">
          <h1 style="color: #4CAF50; margin: 0;">🎉 MATCH !</h1>
          <h2 id="titre-match-gagnant">Nom du film</h2>
          <div id="image-match-container"></div>
          <button class="btn-accueil" onclick="fermerMatch()" style="margin-top: 20px;">Continuer</button>
      </div>
  </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, child, update, onValue, remove } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGYw8Ogut6RqfaNi5YnLHbY1UEjlux2fk",
      authDomain: "movieswipe-95464.firebaseapp.com",
      projectId: "movieswipe-95464",
      storageBucket: "movieswipe-95464.firebasestorage.app",
      messagingSenderId: "512543137074",
      appId: "1:512543137074:web:75836f25f752f2c2588b2b",
      databaseURL: "https://movieswipe-95464-default-rtdb.europe-west1.firebasedatabase.app/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    let estHost = false; // Permet de savoir si on est le créateur
    let listeDesFilms = [];
    let indexFilmActuel = 0;
    let monCodeSalon = "";
    let nombreMembresSalon = 0;
    let matchsDejaAffiches = [];
    const monIdUnique = 'user_' + Math.random().toString(36).substr(2, 9);
    const TMDB_API_KEY = '5f384e833c17a51649e853af374154da';

    // --- LOGIQUE DE DRAG & SWIPE TACTILE ---
    const carte = document.getElementById('carte');
    let startX = 0, currentX = 0, isDragging = false;

    function startDrag(e) {
      isDragging = true;
      startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
      carte.style.transition = 'none';
    }

    function moveDrag(e) {
      if (!isDragging) return;
      currentX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
      const x = currentX - startX;
      carte.style.transform = `translateX(${x}px) rotate(${x/15}deg)`;
    }

    function endDrag() {
      if (!isDragging) return;
      isDragging = false;
      const x = currentX - startX;
      if (x > 100) swiper('oui');
      else if (x < -100) swiper('non');
      else {
        carte.style.transition = 'transform 0.3s ease';
        carte.style.transform = 'translateX(0) rotate(0)';
      }
    }

    carte.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', endDrag);
    carte.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', moveDrag);
    window.addEventListener('touchend', endDrag);

    // --- GÉNÉRATION ALÉATOIRE SÉCURISÉE (FILTRE MAXIMAL) ---
    async function genererGrandeListeTMDB() {
        const nbPages = 5; 
        const requetes = [];

        for (let i = 0; i < nbPages; i++) {
            const pageAleatoire = Math.floor(Math.random() * 500) + 1;
            const url = `https://api.themoviedb.org/3/discover/movie?api_key=${TMDB_API_KEY}&language=fr-FR&sort_by=popularity.desc&include_adult=false&with_original_language=en|fr&page=${pageAleatoire}`;
            requetes.push(fetch(url).then(res => res.json()));
        }

        try {
            const resultats = await Promise.all(requetes);
            let tousLesFilms = [];

            resultats.forEach(data => {
                if (data.results) tousLesFilms = tousLesFilms.concat(data.results);
            });

            // 🛑 NOTRE LISTE NOIRE PERSONNALISÉE
            // Le "i" à la fin signifie qu'il ignore les majuscules/minuscules
            const motsInterdits = /érotique|erotic|porn\b|porno|hardcore|nympho|sexe\b|kamasutra/i;

            // Filtre global
            tousLesFilms = tousLesFilms.filter(film => {
                const aUneAffiche = film.poster_path !== null;
                const sansCaracteresAsiatiques = !/[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uac00-\ud7af]/.test(film.title);
                
                // On vérifie que ni le titre ni le résumé ne contiennent de mots interdits
                const titrePropre = !motsInterdits.test(film.title);
                const resumePropre = film.overview ? !motsInterdits.test(film.overview) : true;
                
                return aUneAffiche && sansCaracteresAsiatiques && titrePropre && resumePropre;
            });

            // On mélange le tout
            return tousLesFilms.sort(() => Math.random() - 0.5);
        } catch (e) {
            console.error("Erreur TMDB:", e);
            return [];
        }
    }

    // --- LOGIQUE SALON ---
   async function creerSalon() {
        await remove(ref(db, 'salons')); 
        monCodeSalon = Math.floor(1000 + Math.random() * 9000).toString();
        estHost = true; 
        
        // 🛑 On crée juste la salle d'attente vide, SANS charger les films pour l'instant
        await set(ref(db, 'salons/' + monCodeSalon), { 
            membres: 1, 
            date: Date.now(),
            statut: 'attente' 
        });
        
        afficherAttente();
    }

    async function rejoindreSalon() {
        const code = document.getElementById('input-code').value.trim();
        if (code === "") { alert("Veuillez entrer un code !"); return; }
        
        const snap = await get(child(ref(db), `salons/${code}`));
        if (snap.exists()) {
            const data = snap.val();
            if (data.statut === 'en_cours') {
                alert("La partie a déjà commencé !");
                return;
            }

            monCodeSalon = code;
            estHost = false; 
            
            await update(ref(db, 'salons/' + code), { membres: (data.membres || 1) + 1 });
            afficherAttente();
        } else { 
            alert("Salon introuvable !"); 
        }
    }
    
    function afficherAttente() {
        document.getElementById('ecran-accueil').style.display = 'none';
        document.getElementById('ecran-attente').style.display = 'flex';
        document.getElementById('code-attente').textContent = monCodeSalon;

        // Le Host voit le bouton "Lancer" ET les choix de plateformes
        if (estHost) {
            document.getElementById('btn-commencer').style.display = 'block';
            document.getElementById('choix-plateformes').style.display = 'block';
            document.getElementById('msg-attente').style.display = 'none';
        } else {
            document.getElementById('btn-commencer').style.display = 'none';
            document.getElementById('choix-plateformes').style.display = 'none';
            document.getElementById('msg-attente').style.display = 'block';
        }

        ecouterLesChangements();
    }

    window.lancerPartie = async () => {
        // On modifie le bouton pour montrer que ça charge
        const btn = document.getElementById('btn-commencer');
        btn.textContent = "Recherche des films en cours... 🍿";
        btn.disabled = true;

        // 1. On lit les cases cochées
        const checkboxes = document.querySelectorAll('.provider-cb:checked');
        const providersList = Array.from(checkboxes).map(cb => cb.value).join('|');

        // 2. Le Host télécharge les films MAINTENANT avec ses critères
        const films = await genererGrandeListeTMDB(providersList);
        listeDesFilms = films;

        // 3. On envoie les films dans Firebase et on change le statut pour déclencher le départ !
        await update(ref(db, 'salons/' + monCodeSalon), { 
            films: films,
            statut: 'en_cours' 
        });
    };

    function ecouterLesChangements() {
        onValue(ref(db, `salons/${monCodeSalon}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            
            nombreMembresSalon = data.membres;
            document.getElementById('nb-joueurs').textContent = nombreMembresSalon;

            // Démarrage synchronisé pour tout le monde
            if (data.statut === 'en_cours' && document.getElementById('ecran-attente').style.display === 'flex') {
                // 🛑 Les invités récupèrent les films générés par le Host
                if (!estHost) {
                    listeDesFilms = data.films || [];
                }
                demarrerAppli();
            }

            // Écoute des Matchs
            if (data.votes) {
                Object.keys(data.votes).forEach(filmId => {
                    const nbOui = Object.values(data.votes[filmId]).filter(v => v === true).length;
                    if (nbOui >= nombreMembresSalon && nombreMembresSalon > 1 && !matchsDejaAffiches.includes(filmId.toString())) {
                        afficherMatch(filmId);
                    }
                });
            }
        });
    }

    function ecouterLesMatchs() {
        onValue(ref(db, `salons/${monCodeSalon}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            nombreMembresSalon = data.membres;
            if (data.votes) {
                Object.keys(data.votes).forEach(filmId => {
                    const nbOui = Object.values(data.votes[filmId]).filter(v => v === true).length;
                    if (nbOui >= nombreMembresSalon && nombreMembresSalon > 1 && !matchsDejaAffiches.includes(filmId.toString())) {
                        afficherMatch(filmId);
                    }
                });
            }
        });
    }

    function swiper(choix) {
        if (!listeDesFilms[indexFilmActuel]) return;
        const film = listeDesFilms[indexFilmActuel];
        const estOui = (choix === 'oui');
        
        set(ref(db, `salons/${monCodeSalon}/votes/${film.id}/${monIdUnique}`), estOui);
        
        carte.classList.add(estOui ? 'swipe-droite' : 'swipe-gauche');

        setTimeout(() => {
            indexFilmActuel++;
            afficherFilmCourant();
            carte.style.transition = 'none';
            carte.classList.remove('swipe-droite', 'swipe-gauche');
            carte.style.transform = 'translateX(0) rotate(0)';
            setTimeout(() => { carte.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; }, 50);
        }, 300);
    }

    function afficherFilmCourant() {
        if (indexFilmActuel >= listeDesFilms.length) {
            document.getElementById('titre-film').textContent = "Plus de films !";
            document.getElementById('note-film').textContent = ""; // On efface la note
            document.getElementById('resume-film').textContent = "Relancez un salon.";
            document.getElementById('affiche-film').innerHTML = "";
            return;
        }
        
        const film = listeDesFilms[indexFilmActuel];
        document.getElementById('titre-film').textContent = film.title;
        
        // --- NOUVEAU : GESTION DE LA NOTE ---
        // On vérifie si le film a une note, et on l'arrondit (ex: 7.4)
        const note = film.vote_average ? film.vote_average.toFixed(1) : "N/A";
        document.getElementById('note-film').textContent = `⭐ ${note} / 10`;
        // ------------------------------------

        document.getElementById('resume-film').textContent = film.overview || "Pas de résumé.";
        document.getElementById('affiche-film').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${film.poster_path}" style="width:100%;height:100%;object-fit:cover;">`;
    }

   function afficherMatch(id) {
        matchsDejaAffiches.push(id.toString());

        const f = listeDesFilms.find(x => x.id.toString() === id.toString());
        if (f) {
            document.getElementById('titre-match-gagnant').textContent = f.title;
            document.getElementById('image-match-container').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${f.poster_path}" class="affiche-match">`;
            document.getElementById('overlay-match').style.display = 'flex';
        }
    }

    function demarrerAppli() {
        document.getElementById('ecran-attente').style.display = 'none'; // On cache l'attente
        document.getElementById('ecran-swipe').style.display = 'flex';
        document.getElementById('affichage-code').style.display = 'inline-block';
        document.getElementById('affichage-code').textContent = "Code: " + monCodeSalon;
        
        afficherFilmCourant();
    }

    function retourAccueil() {
        window.location.reload();
    }

    window.creerSalon = creerSalon;
    window.rejoindreSalon = rejoindreSalon;
    window.swiper = swiper;
    window.retourAccueil = retourAccueil;
    window.fermerMatch = () => document.getElementById('overlay-match').style.display = 'none';
</script>
</body>
</html>
